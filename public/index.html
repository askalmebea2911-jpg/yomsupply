<!DOCTYPE html>
<html lang="am">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>ዮም ሽያጭ ማኔጅመንት ሲስተም</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
        }
        
        .login-container {
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }
        
        .login-box {
            background: white;
            padding: 40px;
            border-radius: 10px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.2);
            width: 350px;
        }
        
        .login-box h2 {
            text-align: center;
            margin-bottom: 30px;
            color: #333;
        }
        
        .login-box input {
            width: 100%;
            padding: 12px;
            margin: 10px 0;
            border: 1px solid #ddd;
            border-radius: 5px;
            font-size: 16px;
        }
        
        .login-box button {
            width: 100%;
            padding: 12px;
            background: #667eea;
            color: white;
            border: none;
            border-radius: 5px;
            font-size: 16px;
            cursor: pointer;
            margin-top: 10px;
        }
        
        .login-box button:hover {
            background: #5a67d8;
        }
        
        .error {
            color: red;
            text-align: center;
            margin-top: 10px;
        }
        
        .dashboard {
            display: none;
        }
        
        .top-bar {
            background: white;
            padding: 15px 30px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
            flex-wrap: wrap;
            gap: 10px;
        }
        
        .top-bar h1 {
            font-size: 20px;
            color: #333;
        }
        
        .user-info {
            display: flex;
            align-items: center;
            gap: 10px;
            flex-wrap: wrap;
        }
        
        .change-pwd-btn {
            background: #48bb78;
            color: white;
            border: none;
            padding: 8px 15px;
            border-radius: 5px;
            cursor: pointer;
        }
        
        .logout-btn {
            background: #e53e3e;
            color: white;
            border: none;
            padding: 8px 15px;
            border-radius: 5px;
            cursor: pointer;
        }
        
        .nav-menu {
            background: #2d3748;
            padding: 10px 15px;
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
            overflow-x: auto;
        }
        
        .nav-btn {
            background: none;
            color: white;
            border: none;
            padding: 8px 12px;
            cursor: pointer;
            font-size: 13px;
            border-radius: 5px;
            white-space: nowrap;
        }
        
        .nav-btn:hover {
            background: #4a5568;
        }
        
        .nav-btn.active {
            background: #667eea;
        }
        
        .content {
            padding: 20px;
        }
        
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
            gap: 15px;
            margin-bottom: 25px;
        }
        
        .stat-card {
            background: white;
            padding: 15px;
            border-radius: 10px;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
        }
        
        .stat-card h3 {
            color: #666;
            font-size: 13px;
            margin-bottom: 8px;
        }
        
        .stat-card .value {
            font-size: 24px;
            font-weight: bold;
            color: #333;
        }
        
        .data-table {
            background: white;
            border-radius: 10px;
            overflow-x: auto;
            margin-top: 20px;
        }
        
        table {
            width: 100%;
            border-collapse: collapse;
            min-width: 500px;
        }
        
        th, td {
            padding: 10px;
            text-align: left;
            border-bottom: 1px solid #eee;
            font-size: 14px;
        }
        
        th {
            background: #f7f7f7;
            font-weight: 600;
        }
        
        .form-container {
            background: white;
            padding: 20px;
            border-radius: 10px;
            margin-bottom: 20px;
        }
        
        .form-container h3 {
            margin-bottom: 15px;
            color: #333;
        }
        
        .form-group {
            margin-bottom: 15px;
        }
        
        .form-group label {
            display: block;
            margin-bottom: 5px;
            font-weight: 500;
            font-size: 14px;
        }
        
        .form-group input, .form-group select, .form-group textarea {
            width: 100%;
            padding: 8px 10px;
            border: 1px solid #ddd;
            border-radius: 5px;
            font-size: 14px;
        }
        
        .btn-primary {
            background: #667eea;
            color: white;
            padding: 10px 20px;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            font-size: 14px;
        }
        
        .btn-primary:hover {
            background: #5a67d8;
        }
        
        .btn-danger {
            background: #e53e3e;
            color: white;
            padding: 5px 10px;
            border: none;
            border-radius: 3px;
            cursor: pointer;
            font-size: 12px;
        }
        
        .btn-edit {
            background: #48bb78;
            color: white;
            padding: 5px 10px;
            border: none;
            border-radius: 3px;
            cursor: pointer;
            margin-right: 5px;
            font-size: 12px;
        }
        
        .btn-warning {
            background: #ed8936;
            color: white;
            padding: 5px 10px;
            border: none;
            border-radius: 3px;
            cursor: pointer;
            font-size: 12px;
        }
        
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.5);
            justify-content: center;
            align-items: center;
            z-index: 1000;
        }
        
        .modal-content {
            background: white;
            padding: 25px;
            border-radius: 10px;
            width: 450px;
            max-width: 90%;
        }
        
        .modal-content h3 {
            margin-bottom: 15px;
        }
        
        .preview-box {
            background: #f0f0f0;
            padding: 10px;
            border-radius: 5px;
            margin-top: 10px;
            text-align: center;
        }
        
        .preview-box span {
            font-weight: bold;
            font-size: 16px;
            color: #667eea;
        }
        
        @media (max-width: 768px) {
            .top-bar h1 {
                font-size: 16px;
            }
            .stats-grid {
                grid-template-columns: repeat(2, 1fr);
            }
            .content {
                padding: 15px;
            }
        }
    </style>
</head>
<body>
    <!-- Login Page -->
    <div id="loginPage" class="login-container">
        <div class="login-box">
            <h2>ዮም ሽያጭ ማኔጅመንት</h2>
            <input type="text" id="username" placeholder="የተጠቃሚ ስም" autocomplete="off">
            <input type="password" id="password" placeholder="ይለፍ ቃል">
            <button onclick="login()">ግባ</button>
            <div id="loginError" class="error"></div>
        </div>
    </div>
    
    <!-- Dashboard -->
    <div id="dashboard" class="dashboard">
        <div class="top-bar">
            <h1>ዮም ሽያጭ ማኔጅመንት ሲስተም</h1>
            <div class="user-info">
                <span id="userName"></span>
                <span id="userRole" style="font-size:12px;color:#666"></span>
                <button class="change-pwd-btn" onclick="showChangePassword()">🔑 ይለፍ ቃል ቀይር</button>
                <button class="logout-btn" onclick="logout()">🚪 ውጣ</button>
            </div>
        </div>
        
        <div class="nav-menu">
            <button class="nav-btn active" onclick="showPage('dashboard')">📊 ዳሽቦርድ</button>
            <button class="nav-btn" onclick="showPage('customers')">👥 ደንበኞች</button>
            <button class="nav-btn" onclick="showPage('products')">📦 ምርቶች</button>
            <button class="nav-btn" onclick="showPage('sales')">💰 ሽያጮች</button>
            <button class="nav-btn" onclick="showPage('employees')">👨‍💼 ሰራተኞች</button>
            <button class="nav-btn" onclick="showPage('users')">👤 ተጠቃሚዎች</button>
            <button class="nav-btn" onclick="showPage('vehicles')">🚗 ተሽከርካሪዎች</button>
            <button class="nav-btn" onclick="showPage('expenses')">💸 ወጪዎች</button>
            <button class="nav-btn" onclick="showPage('preorders')">📋 ቅድመ ትዕዛዝ</button>
            <button class="nav-btn" onclick="showPage('warehouse')">🏪 መጋዘን</button>
            <button class="nav-btn" onclick="showPage('reports')">📈 ሪፖርቶች</button>
        </div>
        
        <div class="content" id="content">
            <!-- Content loads here -->
        </div>
    </div>
    
    <!-- Password Change Modal -->
    <div id="passwordModal" class="modal">
        <div class="modal-content">
            <h3>🔑 ይለፍ ቃል ቀይር</h3>
            <div class="form-group">
                <label>አሁን ያለው ይለፍ ቃል</label>
                <input type="password" id="currentPwd" placeholder="አሁን ያለው ይለፍ ቃል">
            </div>
            <div class="form-group">
                <label>አዲስ ይለፍ ቃል</label>
                <input type="password" id="newPwd" placeholder="አዲስ ይለፍ ቃል (ቢያንስ 4 ፊደላት)">
            </div>
            <div class="form-group">
                <label>አዲሱን ይለፍ ቃል ድገም</label>
                <input type="password" id="confirmPwd" placeholder="እንደገና ያስገቡ">
            </div>
            <button class="btn-primary" onclick="changePassword()">ለውጥ</button>
            <button class="btn-danger" onclick="closePasswordModal()">ዝጋ</button>
            <div id="pwdMsg" style="margin-top:10px; font-size:13px"></div>
        </div>
    </div>
    
    <script>
        // ==================== FETCH HELPER WITH CREDENTIALS ====================
        async function fetchAPI(url, options = {}) {
            const defaultOptions = {
                credentials: 'include',
                headers: {
                    'Content-Type': 'application/json'
                }
            };
            const mergedOptions = { ...defaultOptions, ...options };
            if (options.body) {
                mergedOptions.body = options.body;
            }
            const response = await fetch(url, mergedOptions);
            return response;
        }
        
        let currentUser = null;
        let currentPage = 'dashboard';
        
        // ==================== AUTHENTICATION ====================
        async function checkAuth() {
            try {
                const res = await fetchAPI('/api/auth/me');
                if (res.ok) {
                    const user = await res.json();
                    currentUser = user;
                    document.getElementById('userName').innerText = user.full_name;
                    const roleText = user.role === 'admin' ? 'አስተዳዳሪ' : (user.employee_type === 'sales' ? 'የሽያጭ' : (user.employee_type === 'manager' ? 'ማኔጅር' : 'ሰራተኛ'));
                    document.getElementById('userRole').innerText = '(' + roleText + ')';
                    document.getElementById('loginPage').style.display = 'none';
                    document.getElementById('dashboard').style.display = 'block';
                    showPage('dashboard');
                }
            } catch(e) {
                console.log('Not logged in');
            }
        }
        
        async function login() {
            const username = document.getElementById('username').value;
            const password = document.getElementById('password').value;
            
            if (!username || !password) {
                document.getElementById('loginError').innerText = 'እባክዎ ስም እና ይለፍ ቃል ያስገቡ';
                return;
            }
            
            try {
                const res = await fetchAPI('/api/auth/login', {
                    method: 'POST',
                    body: JSON.stringify({ username, password })
                });
                
                if (res.ok) {
                    const data = await res.json();
                    currentUser = data.user;
                    document.getElementById('userName').innerText = currentUser.full_name;
                    const roleText = currentUser.role === 'admin' ? 'አስተዳዳሪ' : (currentUser.employee_type === 'sales' ? 'የሽያጭ' : 'ሰራተኛ');
                    document.getElementById('userRole').innerText = '(' + roleText + ')';
                    document.getElementById('loginPage').style.display = 'none';
                    document.getElementById('dashboard').style.display = 'block';
                    showPage('dashboard');
                } else {
                    const error = await res.json();
                    document.getElementById('loginError').innerText = error.error;
                }
            } catch(e) {
                document.getElementById('loginError').innerText = 'የሰርቨር ስህተት';
            }
        }
        
        async function logout() {
            await fetchAPI('/api/auth/logout', { method: 'POST' });
            location.reload();
        }
        
        // ==================== PASSWORD CHANGE ====================
        function showChangePassword() {
            document.getElementById('passwordModal').style.display = 'flex';
            document.getElementById('currentPwd').value = '';
            document.getElementById('newPwd').value = '';
            document.getElementById('confirmPwd').value = '';
            document.getElementById('pwdMsg').innerHTML = '';
        }
        
        function closePasswordModal() {
            document.getElementById('passwordModal').style.display = 'none';
        }
        
        async function changePassword() {
            const current = document.getElementById('currentPwd').value;
            const newPwd = document.getElementById('newPwd').value;
            const confirm = document.getElementById('confirmPwd').value;
            
            if (!current || !newPwd) {
                document.getElementById('pwdMsg').innerHTML = '<span style="color:red">እባክዎ ሁሉንም መረጃዎች ይሙሉ</span>';
                return;
            }
            
            if (newPwd !== confirm) {
                document.getElementById('pwdMsg').innerHTML = '<span style="color:red">አዲስ ይለፍ ቃሎች አይመሳሰሉም</span>';
                return;
            }
            
            if (newPwd.length < 4) {
                document.getElementById('pwdMsg').innerHTML = '<span style="color:red">አዲስ ይለፍ ቃል ቢያንስ 4 ፊደላት ሊኖረው ይገባል</span>';
                return;
            }
            
            try {
                const res = await fetchAPI('/api/profile/change-password', {
                    method: 'POST',
                    body: JSON.stringify({ current_password: current, new_password: newPwd })
                });
                
                const data = await res.json();
                if (res.ok) {
                    document.getElementById('pwdMsg').innerHTML = '<span style="color:green">✓ ይለፍ ቃል ተቀይሯል!</span>';
                    setTimeout(() => closePasswordModal(), 1500);
                } else {
                    document.getElementById('pwdMsg').innerHTML = '<span style="color:red">' + data.error + '</span>';
                }
            } catch(e) {
                document.getElementById('pwdMsg').innerHTML = '<span style="color:red">ስህተት ተከስቷል</span>';
            }
        }
        
        // ==================== PAGE NAVIGATION ====================
        async function showPage(page) {
            currentPage = page;
            document.querySelectorAll('.nav-btn').forEach(btn => btn.classList.remove('active'));
            if (event && event.target) event.target.classList.add('active');
            
            const content = document.getElementById('content');
            
            if (page === 'dashboard') await loadDashboard();
            else if (page === 'customers') await loadCustomers();
            else if (page === 'products') await loadProducts();
            else if (page === 'sales') await loadSales();
            else if (page === 'employees') await loadEmployees();
            else if (page === 'users') await loadUsers();
            else if (page === 'vehicles') await loadVehicles();
            else if (page === 'expenses') await loadExpenses();
            else if (page === 'preorders') await loadPreorders();
            else if (page === 'warehouse') await loadWarehouse();
            else if (page === 'reports') await loadReports();
        }
        
        // ==================== DASHBOARD ====================
        async function loadDashboard() {
            const res = await fetchAPI('/api/dashboard');
            const data = await res.json();
            
            document.getElementById('content').innerHTML = `
                <div class="stats-grid">
                    <div class="stat-card"><h3>📅 የዛሬ ሽያጭ</h3><div class="value">${(data.todaySales || 0).toLocaleString()} ብር</div></div>
                    <div class="stat-card"><h3>📆 የወሩ ሽያጭ</h3><div class="value">${(data.monthSales || 0).toLocaleString()} ብር</div></div>
                    <div class="stat-card"><h3>👥 ደንበኞች</h3><div class="value">${data.totalCustomers || 0}</div></div>
                    <div class="stat-card"><h3>📦 ምርቶች</h3><div class="value">${data.totalProducts || 0}</div></div>
                    <div class="stat-card"><h3>⚠️ ዝቅተኛ ክምችት</h3><div class="value">${data.lowStockCount || 0}</div></div>
                    <div class="stat-card"><h3>💸 የዛሬ ወጪ</h3><div class="value">${(data.todayExpenses || 0).toLocaleString()} ብር</div></div>
                </div>
                <div class="data-table">
                    <h3 style="padding:15px 0 0 15px">📋 የቅርብ ጊዜ ሽያጮች</h3>
                    <table><thead><tr><th>ተራ ቁጥር</th><th>ደንበኛ</th><th>ጠቅላላ</th><th>ቀን</th></tr></thead>
                    <tbody>${(data.recentSales || []).map(s => `<tr><td>${s.invoice_number}</td><td>${s.customer_name || 'የገንዘብ ግዢ'}</td><td>${(s.total || 0).toLocaleString()} ብር</td><td>${new Date(s.sale_date).toLocaleDateString()}</td></tr>`).join('')}</tbody></table>
                </div>
            `;
        }
        
        // ==================== CUSTOMERS ====================
        async function loadCustomers() {
            const res = await fetchAPI('/api/customers');
            const customers = await res.json();
            
            document.getElementById('content').innerHTML = `
                <div class="form-container"><h3>➕ አዲስ ደንበኛ</h3>
                    <div class="form-group"><label>ሙሉ ስም</label><input type="text" id="custName" placeholder="ሙሉ ስም"></div>
                    <div class="form-group"><label>ስልክ ቁጥር</label><input type="text" id="custPhone" placeholder="ስልክ ቁጥር"></div>
                    <div class="form-group"><label>አድራሻ</label><input type="text" id="custAddress" placeholder="አድራሻ"></div>
                    <div class="form-group"><label>የብድር ገደብ (ብር)</label><input type="number" id="custCredit" placeholder="የብድር ገደብ"></div>
                    <button class="btn-primary" onclick="addCustomer()">አስገባ</button>
                </div>
                <div class="data-table"><h3 style="padding:15px 0 0 15px">📋 የደንበኞች ዝርዝር</h3>
                <table><thead><tr><th>ስም</th><th>ስልክ</th><th>አድራሻ</th><th>የብድር ገደብ</th><th>ድርጊት</th></tr></thead>
                <tbody>${customers.map(c => `<tr><td>${c.name}</td><td>${c.phone || '-'}</td><td>${c.address || '-'}</td><td>${c.credit_limit} ብር</td><td><button class="btn-danger" onclick="deleteCustomer(${c.id})">ሰርዝ</button></td></tr>`).join('')}</tbody></table></div>
            `;
        }
        
        async function addCustomer() {
            const name = document.getElementById('custName').value;
            if (!name) return alert('እባክዎ ስም ያስገቡ');
            await fetchAPI('/api/customers', {
                method: 'POST',
                body: JSON.stringify({ name, phone: document.getElementById('custPhone').value, address: document.getElementById('custAddress').value, credit_limit: document.getElementById('custCredit').value || 0 })
            });
            loadCustomers();
        }
        
        async function deleteCustomer(id) {
            if (confirm('እርግጠኛ ነዎት?')) {
                await fetchAPI(`/api/customers/${id}`, { method: 'DELETE' });
                loadCustomers();
            }
        }
        
        // ==================== PRODUCTS ====================
        async function loadProducts() {
            const res = await fetchAPI('/api/products');
            const products = await res.json();
            
            document.getElementById('content').innerHTML = `
                <div class="form-container"><h3>➕ አዲስ ምርት</h3>
                    <div class="form-group"><label>የምርት ስም</label><input type="text" id="prodName" placeholder="የምርት ስም"></div>
                    <div class="form-group"><label>ኮድ/ባርኮድ</label><input type="text" id="prodCode" placeholder="ኮድ"></div>
                    <div class="form-group"><label>የሽያጭ ዋጋ (ብር)</label><input type="number" id="prodPrice" placeholder="የሽያጭ ዋጋ"></div>
                    <div class="form-group"><label>ዝቅተኛ ክምችት ማስጠንቀቂያ</label><input type="number" id="prodMinStock" placeholder="ዝቅተኛ ክምችት"></div>

            container.appendChild(newRow);

        async function createSale() {
            const items = [];
            for (let row of document.querySelectorAll('.sale-item')) {
                const productId = row.querySelector('.product-select').value;
                const quantity = row.querySelector('.quantity-input').value;
                if (productId && quantity && quantity > 0) items.push({ product_id: parseInt(productId), quantity: parseFloat(quantity) });
            }
            if (items.length === 0) return alert('ቢያንስ አንድ ምርት ይምረጡ');
            
            const res = await fetchAPI('/api/sales', {
                method: 'POST',
                body: JSON.stringify({ customer_id: document.getElementById('saleCustomer').value || null, items, discount: parseFloat(document.getElementById('saleDiscount').value) || 0, amount_paid: parseFloat(document.getElementById('salePaid').value) || 0 })
            });
            if (res.ok) { alert('ሽያጩ ተመዝግቧል'); loadSales(); }
            else { const err = await res.json(); alert(err.error); }
        }

            document.getElementById('content').innerHTML = `
                <div class="form-container"><h3>➕ አዲስ ወጪ</h3>
                    <div class="form-group"><label>ምድብ</label><select id="expCategory"><option value="fuel">⛽ ነዳጅ</option><option value="maintenance">🔧 ጥገና</option><option value="salary">💰 ደሞዝ</option><option value="other">📋 ሌላ</option></select></div>
                    <div class="form-group"><label>ገንዘብ (ብር)</label><input type="number" id="expAmount" placeholder="ገንዘብ"></div>
                    <div class="form-group"><label>ማብራሪያ</label><input type="text" id="expDesc" placeholder="ማብራሪያ"></div>
                    <button class="btn-primary" onclick="addExpense()">አስገባ</button>
                </div>
                <div class="data-table"><h3 style="padding:15px 0 0 15px">💸 የወጪ ዝርዝር</h3>
                <table><thead><tr><th>ምድብ</th><th>ገንዘብ</th><th>ማብራሪያ</th><th>ቀን</th><th>ድርጊት</th></tr></thead>
                <tbody>${expenses.map(e => `<tr>
                    <td>${e.category === 'fuel' ? '⛽ ነዳጅ' : (e.category === 'maintenance' ? '🔧 ጥገና' : (e.category === 'salary' ? '💰 ደሞዝ' : '📋 ሌላ'))}</td>
                    <td>${e.amount} ብር</td><td>${e.description || '-'}</td><td>${e.expense_date}</td>
                    <td><button class="btn-danger" onclick="deleteExpense(${e.id})">ሰርዝ</button></td>
                </tr>`).join('')}</tbody></table></div>
            `;
        }
        
        async function addExpense() {
            const amount = document.getElementById('expAmount').value;
            if (!amount) return alert('ገንዘብ ያስፈልጋል');
            await fetchAPI('/api/expenses', {
                method: 'POST',
                body: JSON.stringify({ category: document.getElementById('expCategory').value, amount: parseFloat(amount), description: document.getElementById('expDesc').value })
            });
            loadExpenses();
        }
        
        async function deleteExpense(id) {
            if (confirm('እርግጠኛ ነዎት?')) {
                await fetchAPI(`/api/expenses/${id}`, { method: 'DELETE' });
                loadExpenses();
            }
        }
        
        // ==================== PREORDERS ====================
        async function loadPreorders() {
            const preorders = await fetchAPI('/api/preorders').then(r=>r.json());
            const products = await fetchAPI('/api/products').then(r=>r.json());
            const customers = await fetchAPI('/api/customers').then(r=>r.json());
            
            document.getElementById('content').innerHTML = `
                <div class="form-container"><h3>➕ አዲስ ቅድመ ትዕዛዝ</h3>
                    <div class="form-group"><label>ደንበኛ</label><select id="preCustomer"><option value="">ያለ ደንበኛ</option>${customers.map(c => `<option value="${c.id}">${c.name}</option>`).join('')}</select></div>
                    <div class="form-group"><label>ምርት</label><select id="preProduct">${products.map(p => `<option value="${p.id}">${p.name}</option>`).join('')}</select></div>
                    <div class="form-group"><label>ብዛት</label><input type="number" id="preQuantity" placeholder="ብዛት"></div>
                    <div class="form-group"><label>የሚጠበቅበት ቀን</label><input type="date" id="preDate"></div>
                    <button class="btn-primary" onclick="addPreorder()">አስገባ</button>
                </div>
                <div class="data-table"><h3 style="padding:15px 0 0 15px">📋 የቅድመ ትዕዛዝ ዝርዝር</h3>
                <table><thead><tr><th>ደንበኛ</th><th>ምርት</th><th>ብዛት</th><th>የሚጠበቅበት</th><th>ሁኔታ</th><th>ድርጊት</th></tr></thead>
                <tbody>${preorders.map(p => `<tr>
                    <td>${p.customer_name || '-'} </td><td>${p.product_name || '-'}</td><td>${p.quantity}</td>
                    <td>${p.expected_date || '-'}</td><td>${p.status === 'pending' ? '⏳ በመጠባበቅ ላይ' : '✅ ተጠናቅቋል'}</td>
                    <td><button class="btn-danger" onclick="deletePreorder(${p.id})">ሰርዝ</button> 
                        ${p.status === 'pending' ? `<button class="btn-edit" onclick="completePreorder(${p.id})">አጠናቅቅ</button>` : ''}
                       </td>
                </tr>`).join('')}</tbody></table></div>
            `;
        }
        
        async function addPreorder() {
            const productId = document.getElementById('preProduct').value;
            const quantity = document.getElementById('preQuantity').value;
            if (!productId || !quantity) return alert('ምርት እና ብዛት ያስፈልጋል');
            await fetchAPI('/api/preorders', {
                method: 'POST',
                body: JSON.stringify({ customer_id: document.getElementById('preCustomer').value || null, product_id: parseInt(productId), quantity: parseFloat(quantity), expected_date: document.getElementById('preDate').value })
            });
            loadPreorders();
        }
        
        async function deletePreorder(id) {
            if (confirm('እርግጠኛ ነዎት?')) {
                await fetchAPI(`/api/preorders/${id}`, { method: 'DELETE' });
                loadPreorders();
            }
        }
        
        async function completePreorder(id) {
            await fetchAPI(`/api/preorders/${id}/status`, {
                method: 'PUT',
                body: JSON.stringify({ status: 'completed' })
            });
            loadPreorders();
        }
        
        // ==================== WAREHOUSE ====================
        async function loadWarehouse() {
            const summary = await fetchAPI('/api/warehouse/summary').then(r=>r.json());
            const products = await fetchAPI('/api/products').then(r=>r.json());
            
            document.getElementById('content').innerHTML = `
                <div class="form-container"><h3>📦 ክምችት ጨምር</h3>
                    <div class="form-group"><label>ምርት</label><select id="stockProduct">${products.map(p => `<option value="${p.id}">${p.name} (ያለው: ${p.current_stock})</option>`).join('')}</select></div>
                    <div class="form-group"><label>ብዛት</label><input type="number" id="stockQuantity" placeholder="ምን ያህል ጨምር?"></div>
                    <div class="form-group"><label>ማብራሪያ</label><input type="text" id="stockNote" placeholder="ለምን ጨምረሃል?"></div>
                    <button class="btn-primary" onclick="addStock()">ክምችት ጨምር</button>
                </div>
                <div class="data-table"><h3 style="padding:15px 0 0 15px">📊 የክምችት ማጠቃለያ</h3>
                <table><thead><tr><th>ምርት</th><th>ክምችት</th><th>ዝቅተኛ ገደብ</th><th>ሁኔታ</th><th>ድርጊት</th></tr></thead>
                <tbody>${summary.map(p => `<tr>
                    <td>${p.name}</td>
                    <td style="${p.current_stock <= p.min_stock ? 'color:red; font-weight:bold' : ''}">${p.current_stock}</td>
                    <td>${p.min_stock}</td>
                    <td>${p.current_stock <= p.min_stock ? '⚠️ ዝቅተኛ ክምችት!' : '✅ በቂ'}</td>
                    <td><button class="btn-warning" onclick="adjustStockPrompt(${p.id})">🔧 አስተካክል</button></td>
                </tr>`).join('')}</tbody></table></div>
            `;
        }
        
        async function addStock() {
            const productId = document.getElementById('stockProduct').value;
            const quantity = document.getElementById('stockQuantity').value;
            if (!productId || !quantity || quantity <= 0) return alert('ትክክለኛ ብዛት ያስገቡ');
            await fetchAPI('/api/warehouse/add-stock', {
                method: 'POST',
                body: JSON.stringify({ product_id: parseInt(productId), quantity: parseFloat(quantity), notes: document.getElementById('stockNote').value || 'ክምችት መጨመር' })
            });
            alert('ክምችት ተጨምሯል');
            loadWarehouse();
        }
        
        function adjustStockPrompt(productId) {
            const newStock = prompt('አዲስ ክምችት ቁጥር ያስገቡ:');
            if (newStock !== null) {
                adjustStock(productId, parseFloat(newStock));
            }
        }
        
        async function adjustStock(productId, newStock) {
            await fetchAPI('/api/warehouse/adjust', {
                method: 'POST',
                body: JSON.stringify({ product_id: productId, quantity: newStock, reason: 'በእጅ ማስተካከያ' })
            });
            alert('ክምችት ተስተካክሏል');
            loadWarehouse();
        }
        
        // ==================== REPORTS ====================
        async function loadReports() {
            const salesReport = await fetchAPI('/api/reports/sales').then(r=>r.json());
            const profitReport = await fetchAPI('/api/reports/profit').then(r=>r.json());
            
            document.getElementById('content').innerHTML = `
                <div class="stats-grid">
                    <div class="stat-card"><h3>💰 ጠቅላላ ትርፍ</h3><div class="value">${(profitReport.gross_profit || 0).toLocaleString()} ብር</div></div>
                    <div class="stat-card"><h3>💸 ጠቅላላ ወጪ</h3><div class="value">${(profitReport.total_expenses || 0).toLocaleString()} ብር</div></div>
                    <div class="stat-card"><h3>📈 የተጣራ ትርፍ</h3><div class="value">${(profitReport.net_profit || 0).toLocaleString()} ብር</div></div>
                </div>
                <div class="data-table"><h3 style="padding:15px 0 0 15px">📅 የሽያጭ ሪፖርት</h3>
                <table><thead><tr><th>ቀን</th><th>የሽያጭ ብዛት</th><th>ጠቅላላ ገቢ</th><th>የተከፈለ</th></tr></thead>
                <tbody>${salesReport.map(r => `<tr>
                    <td>${r.date}</td><td>${r.count}</td>
                    <td>${(r.total || 0).toLocaleString()} ብር</td>
                    <td>${(r.paid || 0).toLocaleString()} ብር</td>
                </tr>`).join('')}</tbody></table></div>
            `;
        }
        
        // Initialize
        checkAuth();
    </script>
</body>
</html>
