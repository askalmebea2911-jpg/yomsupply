<!DOCTYPE html>
<html lang="am">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ዮም ሽያጭ ማኔጅመንት ሲስተም</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
        }
        
        .login-container {
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }
        
        .login-box {
            background: white;
            padding: 40px;
            border-radius: 10px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.2);
            width: 350px;
        }
        
        .login-box h2 {
            text-align: center;
            margin-bottom: 30px;
            color: #333;
        }
        
        .login-box input {
            width: 100%;
            padding: 12px;
            margin: 10px 0;
            border: 1px solid #ddd;
            border-radius: 5px;
            font-size: 16px;
        }
        
        .login-box button {
            width: 100%;
            padding: 12px;
            background: #667eea;
            color: white;
            border: none;
            border-radius: 5px;
            font-size: 16px;
            cursor: pointer;
            margin-top: 10px;
        }
        
        .login-box button:hover {
            background: #5a67d8;
        }
        
        .error {
            color: red;
            text-align: center;
            margin-top: 10px;
        }
        
        .dashboard {
            display: none;
        }
        
        .top-bar {
            background: white;
            padding: 15px 30px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
        }
        
        .top-bar h1 {
            font-size: 24px;
            color: #333;
        }
        
        .user-info {
            display: flex;
            align-items: center;
            gap: 15px;
        }
        
        .change-pwd-btn {
            background: #48bb78;
            color: white;
            border: none;
            padding: 8px 15px;
            border-radius: 5px;
            cursor: pointer;
        }
        
        .logout-btn {
            background: #e53e3e;
            color: white;
            border: none;
            padding: 8px 15px;
            border-radius: 5px;
            cursor: pointer;
        }
        
        .nav-menu {
            background: #2d3748;
            padding: 10px 30px;
            display: flex;
            gap: 15px;
            flex-wrap: wrap;
        }
        
        .nav-btn {
            background: none;
            color: white;
            border: none;
            padding: 8px 15px;
            cursor: pointer;
            font-size: 14px;
            border-radius: 5px;
        }
        
        .nav-btn:hover {
            background: #4a5568;
        }
        
        .nav-btn.active {
            background: #667eea;
        }
        
        .content {
            padding: 30px;
        }
        
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }
        
        .stat-card {
            background: white;
            padding: 20px;
            border-radius: 10px;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
        }
        
        .stat-card h3 {
            color: #666;
            font-size: 14px;
            margin-bottom: 10px;
        }
        
        .stat-card .value {
            font-size: 28px;
            font-weight: bold;
            color: #333;
        }
        
        .data-table {
            background: white;
            border-radius: 10px;
            overflow-x: auto;
        }
        
        table {
            width: 100%;
            border-collapse: collapse;
        }
        
        th, td {
            padding: 12px;
            text-align: left;
            border-bottom: 1px solid #eee;
        }
        
        th {
            background: #f7f7f7;
            font-weight: 600;
        }
        
        .form-container {
            background: white;
            padding: 20px;
            border-radius: 10px;
            margin-bottom: 20px;
        }
        
        .form-group {
            margin-bottom: 15px;
        }
        
        .form-group label {
            display: block;
            margin-bottom: 5px;
            font-weight: 500;
        }
        
        .form-group input, .form-group select, .form-group textarea {
            width: 100%;
            padding: 8px;
            border: 1px solid #ddd;
            border-radius: 5px;
        }
        
        .btn-primary {
            background: #667eea;
            color: white;
            padding: 10px 20px;
            border: none;
            border-radius: 5px;
            cursor: pointer;
        }
        
        .btn-danger {
            background: #e53e3e;
            color: white;
            padding: 5px 10px;
            border: none;
            border-radius: 3px;
            cursor: pointer;
        }
        
        .btn-edit {
            background: #48bb78;
            color: white;
            padding: 5px 10px;
            border: none;
            border-radius: 3px;
            cursor: pointer;
            margin-right: 5px;
        }
        
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.5);
            justify-content: center;
            align-items: center;
            z-index: 1000;
        }
        
        .modal-content {
            background: white;
            padding: 30px;
            border-radius: 10px;
            width: 500px;
            max-width: 90%;
        }
        
        .success-msg {
            background: #48bb78;
            color: white;
            padding: 10px;
            border-radius: 5px;
            margin-bottom: 15px;
        }
        
        @media (max-width: 768px) {
            .nav-menu {
                overflow-x: auto;
            }
            .stats-grid {
                grid-template-columns: repeat(2, 1fr);
            }
        }
    </style>
</head>
<body>
    <!-- Login Page -->
    <div id="loginPage" class="login-container">
        <div class="login-box">
            <h2>ዮም ሽያጭ ማኔጅመንት</h2>
            <input type="text" id="username" placeholder="የተጠቃሚ ስም" autocomplete="off">
            <input type="password" id="password" placeholder="ይለፍ ቃል">
            <button onclick="login()">ግባ</button>
            <div id="loginError" class="error"></div>
        </div>
    </div>
    
    <!-- Dashboard -->
    <div id="dashboard" class="dashboard">
        <div class="top-bar">
            <h1>ዮም ሽያጭ ማኔጅመንት ሲስተም</h1>
            <div class="user-info">
                <span id="userName"></span>
                <span id="userRole" style="font-size:12px;color:#666"></span>
                <button class="change-pwd-btn" onclick="showChangePassword()">🔑 ይለፍ ቃል ቀይር</button>
                <button class="logout-btn" onclick="logout()">ውጣ</button>
            </div>
        </div>
        
        <div class="nav-menu">
            <button class="nav-btn active" onclick="showPage('dashboard')">📊 ዳሽቦርድ</button>
            <button class="nav-btn" onclick="showPage('customers')">👥 ደንበኞች</button>
            <button class="nav-btn" onclick="showPage('products')">📦 ምርቶች</button>
            <button class="nav-btn" onclick="showPage('sales')">💰 ሽያጮች</button>
            <button class="nav-btn" onclick="showPage('employees')">👨‍💼 ሰራተኞች</button>
            <button class="nav-btn" onclick="showPage('users')">👤 ተጠቃሚዎች</button>
            <button class="nav-btn" onclick="showPage('vehicles')">🚗 ተሽከርካሪዎች</button>
            <button class="nav-btn" onclick="showPage('expenses')">💸 ወጪዎች</button>
            <button class="nav-btn" onclick="showPage('preorders')">📋 ቅድመ ትዕዛዝ</button>
            <button class="nav-btn" onclick="showPage('warehouse')">🏪 መጋዘን</button>
            <button class="nav-btn" onclick="showPage('reports')">📈 ሪፖርቶች</button>
        </div>
        
        <div class="content" id="content">
            <!-- Content loads here -->
        </div>
    </div>
    
    <!-- Password Change Modal -->
    <div id="passwordModal" class="modal">
        <div class="modal-content">
            <h3>🔑 ይለፍ ቃል ቀይር</h3>
            <div class="form-group">
                <label>አሁን ያለው ይለፍ ቃል</label>
                <input type="password" id="currentPwd" placeholder="አሁን ያለው ይለፍ ቃል">
            </div>
            <div class="form-group">
                <label>አዲስ ይለፍ ቃል</label>
                <input type="password" id="newPwd" placeholder="አዲስ ይለፍ ቃል">
            </div>
            <div class="form-group">
                <label>አዲሱን ይለፍ ቃል ድገም</label>
                <input type="password" id="confirmPwd" placeholder="እንደገና ያስገቡ">
            </div>
            <button class="btn-primary" onclick="changePassword()">ለውጥ</button>
            <button class="btn-danger" onclick="closePasswordModal()">ዝጋ</button>
            <div id="pwdMsg" style="margin-top:10px"></div>
        </div>
    </div>
    
    <!-- Temp Password Display Modal -->
    <div id="tempPasswordModal" class="modal">
        <div class="modal-content">
            <h3>🆕 ጊዜያዊ ይለፍ ቃል</h3>
            <p>ለሰራተኛው የሚከተለው ጊዜያዊ ይለፍ ቃል ተፈጥሯል፦</p>
            <div style="background:#f0f0f0;padding:15px;border-radius:5px;margin:15px 0;text-align:center">
                <strong id="tempPwdValue" style="font-size:20px"></strong>
            </div>
            <p>ሰራተኛው በመጀመሪያ ጊዜ ገብቶ ይለፍ ቃሉን መቀየር አለበት።</p>
            <button class="btn-primary" onclick="closeTempPasswordModal()">ዘጋ</button>
        </div>
    </div>
    
    <script>
        let currentUser = null;
        let currentPage = 'dashboard';
        
        async function checkAuth() {
            try {
                const res = await fetch('/api/auth/me');
                if (res.ok) {
                    const user = await res.json();
                    currentUser = user;
                    document.getElementById('userName').innerText = user.full_name;
                    document.getElementById('userRole').innerText = '(' + (user.role === 'admin' ? 'አስተዳዳሪ' : 'ሰራተኛ') + ')';
                    document.getElementById('loginPage').style.display = 'none';
                    document.getElementById('dashboard').style.display = 'block';
                    showPage('dashboard');
                }
            } catch(e) {}
        }
        
        async function login() {
            const username = document.getElementById('username').value;
            const password = document.getElementById('password').value;
            
            if (!username || !password) {
                document.getElementById('loginError').innerText = 'እባክዎ ስም እና ይለፍ ቃል ያስገቡ';
                return;
            }
            
            try {
                const res = await fetch('/api/auth/login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ username, password })
                });
                
                if (res.ok) {
                    const data = await res.json();
                    currentUser = data.user;
                    document.getElementById('userName').innerText = currentUser.full_name;
                    document.getElementById('userRole').innerText = '(' + (currentUser.role === 'admin' ? 'አስተዳዳሪ' : 'ሰራተኛ') + ')';
                    document.getElementById('loginPage').style.display = 'none';
                    document.getElementById('dashboard').style.display = 'block';
                    showPage('dashboard');
                } else {
                    const error = await res.json();
                    document.getElementById('loginError').innerText = error.error;
                }
            } catch(e) {
                document.getElementById('loginError').innerText = 'የሰርቨር ስህተት';
            }
        }
        
        async function logout() {
            await fetch('/api/auth/logout', { method: 'POST' });
            location.reload();
        }
        
        // Password Change Functions
        function showChangePassword() {
            document.getElementById('passwordModal').style.display = 'flex';
            document.getElementById('currentPwd').value = '';
            document.getElementById('newPwd').value = '';
            document.getElementById('confirmPwd').value = '';
            document.getElementById('pwdMsg').innerHTML = '';
        }
        
        function closePasswordModal() {
            document.getElementById('passwordModal').style.display = 'none';
        }
        
        async function changePassword() {
            const current = document.getElementById('currentPwd').value;
            const newPwd = document.getElementById('newPwd').value;
            const confirm = document.getElementById('confirmPwd').value;
            
            if (!current || !newPwd) {
                document.getElementById('pwdMsg').innerHTML = '<span style="color:red">እባክዎ ሁሉንም መረጃዎች ይሙሉ</span>';
                return;
            }
            
            if (newPwd !== confirm) {
                document.getElementById('pwdMsg').innerHTML = '<span style="color:red">አዲስ ይለፍ ቃሎች አይመሳሰሉም</span>';
                return;
            }
            
            if (newPwd.length < 4) {
                document.getElementById('pwdMsg').innerHTML = '<span style="color:red">አዲስ ይለፍ ቃል ቢያንስ 4 ፊደላት ሊኖረው ይገባል</span>';
                return;
            }
            
            try {
                const res = await fetch('/api/profile/change-password', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ current_password: current, new_password: newPwd })
                });
                
                const data = await res.json();
                if (res.ok) {
                    document.getElementById('pwdMsg').innerHTML = '<span style="color:green">✓ ይለፍ ቃል ተቀይሯል!</span>';
                    setTimeout(() => closePasswordModal(), 2000);
                } else {
                    document.getElementById('pwdMsg').innerHTML = '<span style="color:red">' + data.error + '</span>';
                }
            } catch(e) {
                document.getElementById('pwdMsg').innerHTML = '<span style="color:red">ስህተት ተከስቷል</span>';
            }
        }
        
        function showTempPassword(password) {
            document.getElementById('tempPwdValue').innerText = password;
            document.getElementById('tempPasswordModal').style.display = 'flex';
        }
        
        function closeTempPasswordModal() {
            document.getElementById('tempPasswordModal').style.display = 'none';
        }
        
        // Page navigation
        async function showPage(page) {
            currentPage = page;
            document.querySelectorAll('.nav-btn').forEach(btn => btn.classList.remove('active'));
            event.target.classList.add('active');
            
            const content = document.getElementById('content');
            
            if (page === 'dashboard') await loadDashboard();
            else if (page === 'customers') await loadCustomers();
            else if (page === 'products') await loadProducts();
            else if (page === 'sales') await loadSales();
            else if (page === 'employees') await loadEmployees();
            else if (page === 'users') await loadUsers();
            else if (page === 'vehicles') await loadVehicles();
            else if (page === 'expenses') await loadExpenses();
            else if (page === 'preorders') await loadPreorders();
            else if (page === 'warehouse') await loadWarehouse();
            else if (page === 'reports') await loadReports();
        }
        
        // Load Dashboard
        async function loadDashboard() {
            const res = await fetch('/api/dashboard');
            const data = await res.json();
            
            document.getElementById('content').innerHTML = `
                <div class="stats-grid">
                    <div class="stat-card"><h3>የዛሬ ሽያጭ</h3><div class="value">${data.todaySales.toLocaleString()} ብር</div></div>
                    <div class="stat-card"><h3>የወሩ ሽያጭ</h3><div class="value">${data.monthSales.toLocaleString()} ብር</div></div>
                    <div class="stat-card"><h3>ደንበኞች</h3><div class="value">${data.totalCustomers}</div></div>
                    <div class="stat-card"><h3>ምርቶች</h3><div class="value">${data.totalProducts}</div></div>
                    <div class="stat-card"><h3>ዝቅተኛ ክምችት</h3><div class="value">${data.lowStockCount}</div></div>
                    <div class="stat-card"><h3>የዛሬ ወጪ</h3><div class="value">${data.todayExpenses.toLocaleString()} ብር</div></div>
                </div>
                <div class="data-table">
                    <h3>የቅርብ ጊዜ ሽያጮች</h3>
                    <table><thead><tr><th>ተራ ቁጥር</th><th>ደንበኛ</th><th>ጠቅላላ</th><th>ቀን</th></tr></thead>
                    <tbody>${data.recentSales.map(s => `<tr><td>${s.invoice_number}</td><td>${s.customer_name || 'የገንዘብ ግዢ'}</td><td>${s.total.toLocaleString()} ብር</td><td>${new Date(s.sale_date).toLocaleDateString()}</td></tr>`).join('')}</tbody></table>
                </div>
            `;
        }
        
        // Load Customers
        async function loadCustomers() {
            const res = await fetch('/api/customers');
            const customers = await res.json();
            
            document.getElementById('content').innerHTML = `
                <div class="form-container"><h3>አዲስ ደንበኛ</h3>
                    <div class="form-group"><label>ስም</label><input type="text" id="custName" placeholder="ሙሉ ስም"></div>
                    <div class="form-group"><label>ስልክ</label><input type="text" id="custPhone" placeholder="ስልክ ቁጥር"></div>
                    <div class="form-group"><label>አድራሻ</label><input type="text" id="custAddress" placeholder="አድራሻ"></div>
                    <div class="form-group"><label>የብድር ገደብ</label><input type="number" id="custCredit" placeholder="የብድር ገደብ"></div>
                    <button class="btn-primary" onclick="addCustomer()">አስገባ</button>
                </div>
                <div class="data-table"><h3>የደንበኞች ዝርዝር</h3>
                <table><thead><tr><th>ስም</th><th>ስልክ</th><th>አድራሻ</th><th>የብድር ገደብ</th><th>ድርጊት</th></tr></thead>
                <tbody>${customers.map(c => `<tr><td>${c.name}</td><td>${c.phone || '-'}</td><td>${c.address || '-'}</td><td>${c.credit_limit} ብር</td><td><button class="btn-danger" onclick="deleteCustomer(${c.id})">ሰርዝ</button></td></tr>`).join('')}</tbody></table></div>
            `;
        }
        
        async function addCustomer() {
            const name = document.getElementById('custName').value;
            if (!name) return alert('እባክዎ ስም ያስገቡ');
            await fetch('/api/customers', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ name, phone: document.getElementById('custPhone').value, address: document.getElementById('custAddress').value, credit_limit: document.getElementById('custCredit').value || 0 })
            });
            loadCustomers();
        }
        
        async function deleteCustomer(id) {
            if (confirm('እርግጠኛ ነዎት?')) {
                await fetch(`/api/customers/${id}`, { method: 'DELETE' });
                loadCustomers();
            }
        }
        
        // Load Products
        async function loadProducts() {
            const res = await fetch('/api/products');
            const products = await res.json();
            
            document.getElementById('content').innerHTML = `
                <div class="form-container"><h3>አዲስ ምርት</h3>
                    <div class="form-group"><label>ስም</label><input type="text" id="prodName" placeholder="የምርት ስም"></div>
                    <div class="form-group"><label>ኮድ</label><input type="text" id="prodCode" placeholder="ኮድ"></div>
                    <div class="form-group"><label>የሽያጭ ዋጋ</label><input type="number" id="prodPrice" placeholder="የሽያጭ ዋጋ"></div>
                    <div class="form-group"><label>ዝቅተኛ ክምችት</label><input type="number" id="prodMinStock" placeholder="ዝቅተኛ ክምችት"></div>
                    <button class="btn-primary" onclick="addProduct()">አስገባ</button>
                </div>
                <div class="data-table"><h3>የምርቶች ዝርዝር</h3>
                <table><thead><tr><th>ስም</th><th>ኮድ</th><th>ዋጋ</th><th>ክምችት</th><th>ዝቅተኛ</th><th>ድርጊት</th></tr></thead>
                <tbody>${products.map(p => `<tr><td>${p.name}</td><td>${p.code || '-'}</td><td>${p.selling_price} ብር</td><td style="${p.current_stock <= p.min_stock ? 'color:red' : ''}">${p.current_stock}</td><td>${p.min_stock}</td><td><button class="btn-danger" onclick="deleteProduct(${p.id})">ሰርዝ</button></td></tr>`).join('')}</tbody></table></div>
            `;
        }
        
        async function addProduct() {

        async function addStock() {
            const productId = document.getElementById('stockProduct').value;
            const quantity = document.getElementById('stockQuantity').value;
            if (!productId || !quantity || quantity <= 0) return alert('ትክክለኛ ብዛት ያስገቡ');
            await fetch('/api/warehouse/add-stock', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ product_id: parseInt(productId), quantity: parseFloat(quantity), notes: 'ክምችት መጨመር' })
            });
            alert('ክምችት ተጨምሯል');
            loadWarehouse();
        }
        
        // Load Reports
        async function loadReports() {
            const salesReport = await fetch('/api/reports/sales').then(r=>r.json());
            const profitReport = await fetch('/api/reports/profit').then(r=>r.json());
            
            document.getElementById('content').innerHTML = `
                <div class="stats-grid">
                    <div class="stat-card"><h3>ጠቅላላ ትርፍ</h3><div class="value">${profitReport.gross_profit.toLocaleString()} ብር</div></div>
                    <div class="stat-card"><h3>ጠቅላላ ወጪ</h3><div class="value">${profitReport.total_expenses.toLocaleString()} ብር</div></div>
                    <div class="stat-card"><h3>የተጣራ ትርፍ</h3><div class="value">${profitReport.net_profit.toLocaleString()} ብር</div></div>
                </div>
                <div class="data-table"><h3>የሽያጭ ሪፖርት</h3>
                <table><thead><tr><th>ቀን</th><th>ብዛት</th><th>ጠቅላላ</th><th>የተከፈለ</th></tr></thead>
                <tbody>${salesReport.map(r => `<tr><td>${r.date}</td><td>${r.count}</td><td>${r.total.toLocaleString()} ብር</td><td>${r.paid.toLocaleString()} ብር</td></tr>`).join('')}</tbody></table></div>
            `;
        }
        
        // Initialize
        checkAuth();
    </script>
</body>
</html>
