<!DOCTYPE html>
<html lang="am">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ዮም ሽያጭ ማኔጅመንት ሲስተም</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
        }
        
        /* Login Page */
        .login-container {
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }
        
        .login-box {
            background: white;
            padding: 40px;
            border-radius: 10px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.2);
            width: 350px;
        }
        
        .login-box h2 {
            text-align: center;
            margin-bottom: 30px;
            color: #333;
        }
        
        .login-box input {
            width: 100%;
            padding: 12px;
            margin: 10px 0;
            border: 1px solid #ddd;
            border-radius: 5px;
            font-size: 16px;
        }
        
        .login-box button {
            width: 100%;
            padding: 12px;
            background: #667eea;
            color: white;
            border: none;
            border-radius: 5px;
            font-size: 16px;
            cursor: pointer;
            margin-top: 10px;
        }
        
        .login-box button:hover {
            background: #5a67d8;
        }
        
        .error {
            color: red;
            text-align: center;
            margin-top: 10px;
        }
        
        /* Dashboard */
        .dashboard {
            display: none;
        }
        
        .top-bar {
            background: white;
            padding: 15px 30px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
        }
        
        .top-bar h1 {
            font-size: 24px;
            color: #333;
        }
        
        .user-info {
            display: flex;
            align-items: center;
            gap: 15px;
        }
        
        .logout-btn {
            background: #e53e3e;
            color: white;
            border: none;
            padding: 8px 15px;
            border-radius: 5px;
            cursor: pointer;
        }
        
        .nav-menu {
            background: #2d3748;
            padding: 10px 30px;
            display: flex;
            gap: 15px;
            flex-wrap: wrap;
        }
        
        .nav-btn {
            background: none;
            color: white;
            border: none;
            padding: 8px 15px;
            cursor: pointer;
            font-size: 14px;
            border-radius: 5px;
        }
        
        .nav-btn:hover {
            background: #4a5568;
        }
        
        .nav-btn.active {
            background: #667eea;
        }
        
        .content {
            padding: 30px;
        }
        
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }
        
        .stat-card {
            background: white;
            padding: 20px;
            border-radius: 10px;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
        }
        
        .stat-card h3 {
            color: #666;
            font-size: 14px;
            margin-bottom: 10px;
        }
        
        .stat-card .value {
            font-size: 28px;
            font-weight: bold;
            color: #333;
        }
        
        .data-table {
            background: white;
            border-radius: 10px;
            overflow-x: auto;
        }
        
        table {
            width: 100%;
            border-collapse: collapse;
        }
        
        th, td {
            padding: 12px;
            text-align: left;
            border-bottom: 1px solid #eee;
        }
        
        th {
            background: #f7f7f7;
            font-weight: 600;
        }
        
        .form-container {
            background: white;
            padding: 20px;
            border-radius: 10px;
            margin-bottom: 20px;
        }
        
        .form-group {
            margin-bottom: 15px;
        }
        
        .form-group label {
            display: block;
            margin-bottom: 5px;
            font-weight: 500;
        }
        
        .form-group input, .form-group select, .form-group textarea {
            width: 100%;
            padding: 8px;
            border: 1px solid #ddd;
            border-radius: 5px;
        }
        
        .btn-primary {
            background: #667eea;
            color: white;
            padding: 10px 20px;
            border: none;
            border-radius: 5px;
            cursor: pointer;
        }
        
        .btn-danger {
            background: #e53e3e;
            color: white;
            padding: 5px 10px;
            border: none;
            border-radius: 3px;
            cursor: pointer;
        }
        
        .btn-edit {
            background: #48bb78;
            color: white;
            padding: 5px 10px;
            border: none;
            border-radius: 3px;
            cursor: pointer;
            margin-right: 5px;
        }
        
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.5);
            justify-content: center;
            align-items: center;
        }
        
        .modal-content {
            background: white;
            padding: 30px;
            border-radius: 10px;
            width: 500px;
            max-width: 90%;
        }
        
        @media (max-width: 768px) {
            .nav-menu {
                overflow-x: auto;
            }
            .stats-grid {
                grid-template-columns: repeat(2, 1fr);
            }
        }
    </style>
</head>
<body>
    <!-- Login Page -->
    <div id="loginPage" class="login-container">
        <div class="login-box">
            <h2>ዮም ሽያጭ ማኔጅመንት</h2>
            <input type="text" id="username" placeholder="የተጠቃሚ ስም" autocomplete="off">
            <input type="password" id="password" placeholder="ይለፍ ቃል">
            <button onclick="login()">ግባ</button>
            <div id="loginError" class="error"></div>
        </div>
    </div>
    
    <!-- Dashboard -->
    <div id="dashboard" class="dashboard">
        <div class="top-bar">
            <h1>ዮም ሽያጭ ማኔጅመንት ሲስተም</h1>
            <div class="user-info">
                <span id="userName"></span>
                <button class="logout-btn" onclick="logout()">ውጣ</button>
            </div>
        </div>
        
        <div class="nav-menu">
            <button class="nav-btn active" onclick="showPage('dashboard')">📊 ዳሽቦርድ</button>
            <button class="nav-btn" onclick="showPage('customers')">👥 ደንበኞች</button>
            <button class="nav-btn" onclick="showPage('products')">📦 ምርቶች</button>
            <button class="nav-btn" onclick="showPage('sales')">💰 ሽያጮች</button>
            <button class="nav-btn" onclick="showPage('employees')">👨‍💼 ሰራተኞች</button>
            <button class="nav-btn" onclick="showPage('vehicles')">🚗 ተሽከርካሪዎች</button>
            <button class="nav-btn" onclick="showPage('expenses')">💸 ወጪዎች</button>
            <button class="nav-btn" onclick="showPage('preorders')">📋 ቅድመ ትዕዛዝ</button>
            <button class="nav-btn" onclick="showPage('warehouse')">🏪 መጋዘን</button>
            <button class="nav-btn" onclick="showPage('reports')">📈 ሪፖርቶች</button>
        </div>
        
        <div class="content" id="content">
            <!-- Dashboard content will be loaded here -->
        </div>
    </div>
    
    <script>
        let currentUser = null;
        let currentPage = 'dashboard';
        
        // Check if user is logged in
        async function checkAuth() {
            try {
                const res = await fetch('/api/auth/me');
                if (res.ok) {
                    const user = await res.json();
                    currentUser = user;
                    document.getElementById('userName').innerText = user.full_name;
                    document.getElementById('loginPage').style.display = 'none';
                    document.getElementById('dashboard').style.display = 'block';
                    showPage('dashboard');
                }
            } catch(e) {
                // Not logged in
            }
        }
        
        // Login
        async function login() {
            const username = document.getElementById('username').value;
            const password = document.getElementById('password').value;
            
            if (!username || !password) {
                document.getElementById('loginError').innerText = 'እባክዎ ስም እና ይለፍ ቃል ያስገቡ';
                return;
            }
            
            try {
                const res = await fetch('/api/auth/login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ username, password })
                });
                
                if (res.ok) {
                    const data = await res.json();
                    currentUser = data.user;
                    document.getElementById('userName').innerText = currentUser.full_name;
                    document.getElementById('loginPage').style.display = 'none';
                    document.getElementById('dashboard').style.display = 'block';
                    showPage('dashboard');
                } else {
                    const error = await res.json();
                    document.getElementById('loginError').innerText = error.error;
                }
            } catch(e) {
                document.getElementById('loginError').innerText = 'የሰርቨር ስህተት';
            }
        }
        
        // Logout
        async function logout() {
            await fetch('/api/auth/logout', { method: 'POST' });
            location.reload();
        }
        
        // Show page
        async function showPage(page) {
            currentPage = page;
            document.querySelectorAll('.nav-btn').forEach(btn => btn.classList.remove('active'));
            event.target.classList.add('active');
            
            const content = document.getElementById('content');
            
            if (page === 'dashboard') {
                await loadDashboard();
            } else if (page === 'customers') {
                await loadCustomers();
            } else if (page === 'products') {
                await loadProducts();
            } else if (page === 'sales') {
                await loadSales();
            } else if (page === 'employees') {
                await loadEmployees();
            } else if (page === 'vehicles') {
                await loadVehicles();
            } else if (page === 'expenses') {
                await loadExpenses();
            } else if (page === 'preorders') {
                await loadPreorders();
            } else if (page === 'warehouse') {
                await loadWarehouse();
            } else if (page === 'reports') {
                await loadReports();
            }
        }
        
        // Load Dashboard
        async function loadDashboard() {
            const res = await fetch('/api/dashboard');
            const data = await res.json();
            
            document.getElementById('content').innerHTML = `
                <div class="stats-grid">
                    <div class="stat-card">
                        <h3>የዛሬ ሽያጭ</h3>
                        <div class="value">${data.todaySales.toLocaleString()} ብር</div>
                    </div>
                    <div class="stat-card">
                        <h3>የወሩ ሽያጭ</h3>
                        <div class="value">${data.monthSales.toLocaleString()} ብር</div>
                    </div>
                    <div class="stat-card">
                        <h3>ደንበኞች</h3>
                        <div class="value">${data.totalCustomers}</div>
                    </div>
                    <div class="stat-card">
                        <h3>ምርቶች</h3>
                        <div class="value">${data.totalProducts}</div>
                    </div>
                    <div class="stat-card">
                        <h3>ዝቅተኛ ክምችት</h3>
                        <div class="value">${data.lowStockCount}</div>
                    </div>
                    <div class="stat-card">
                        <h3>የዛሬ ወጪ</h3>
                        <div class="value">${data.todayExpenses.toLocaleString()} ብር</div>
                    </div>
                    <div class="stat-card">
                        <h3>ያልተጠናቀቀ ቅድመ ትዕዛዝ</h3>
                        <div class="value">${data.pendingPreorders}</div>
                    </div>
                </div>
                <div class="data-table">
                    <h3>የቅርብ ጊዜ ሽያጮች</h3>
                    <table>
                        <thead>
                            <tr><th>ተራ ቁጥር</th><th>ደንበኛ</th><th>ጠቅላላ</th><th>ቀን</th></tr>
                        </thead>
                        <tbody>
                            ${data.recentSales.map(sale => `
                                <tr><td>${sale.invoice_number}</td><td>${sale.customer_name || 'የገንዘብ ግዢ'}</td><td>${sale.total.toLocaleString()} ብር</td><td>${new Date(sale.sale_date).toLocaleDateString()}</td></tr>
                            `).join('')}
                        </tbody>
                    </table>
                </div>
            `;
        }
        
        // Load Customers
        async function loadCustomers() {
            const res = await fetch('/api/customers');
            const customers = await res.json();
            
            document.getElementById('content').innerHTML = `
                <div class="form-container">
                    <h3>አዲስ ደንበኛ</h3>
                    <div class="form-group"><label>ስም</label><input type="text" id="custName" placeholder="ሙሉ ስም"></div>
                    <div class="form-group"><label>ስልክ</label><input type="text" id="custPhone" placeholder="ስልክ ቁጥር"></div>
                    <div class="form-group"><label>አድራሻ</label><input type="text" id="custAddress" placeholder="አድራሻ"></div>
                    <div class="form-group"><label>ኢሜል</label><input type="email" id="custEmail" placeholder="ኢሜል"></div>
                    <div class="form-group"><label>የብድር ገደብ</label><input type="number" id="custCredit" placeholder="የብድር ገደብ"></div>
                    <button class="btn-primary" onclick="addCustomer()">አስገባ</button>
                </div>
                <div class="data-table">
                    <h3>የደንበኞች ዝርዝር</h3>
                    <table>
                        <thead><tr><th>ስም</th><th>ስልክ</th><th>አድራሻ</th><th>የብድር ገደብ</th><th>ድርጊት</th></tr></thead>
                        <tbody>
                            ${customers.map(c => `
                                <tr>
                                    <td>${c.name}</td><td>${c.phone || '-'}</td><td>${c.address || '-'}</td>
                                    <td>${c.credit_limit} ብር</td>
                                    <td><button class="btn-edit" onclick="editCustomer(${c.id})">አርትዕ</button><button class="btn-danger" onclick="deleteCustomer(${c.id})">ሰርዝ</button></td>
                                </tr>
                            `).join('')}
                        </tbody>
                    </table>
                </div>
            `;
        }
        
        async function addCustomer() {
            const name = document.getElementById('custName').value;
            if (!name) return alert('እባክዎ ስም ያስገቡ');
            
            await fetch('/api/customers', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    name, phone: document.getElementById('custPhone').value,
                    address: document.getElementById('custAddress').value,
                    email: document.getElementById('custEmail').value,
                    credit_limit: document.getElementById('custCredit').value || 0
                })
            });
            loadCustomers();
        }
        
        async function deleteCustomer(id) {
            if (confirm('እርግጠኛ ነዎት?')) {
                await fetch(`/api/customers/${id}`, { method: 'DELETE' });
                loadCustomers();
            }
        }
        
        // Load Products
        async function loadProducts() {
            const res = await fetch('/api/products');
            const products = await res.json();
            
            document.getElementById('content').innerHTML = `
                <div class="form-container">
                    <h3>አዲስ ምርት</h3>
                    <div class="form-group"><label>ስም</label><input type="text" id="prodName" placeholder="የምርት ስም"></div>
                    <div class="form-group"><label>ኮድ</label><input type="text" id="prodCode" placeholder="ኮድ"></div>
                    <div class="form-group"><label>ምድብ</label><input type="text" id="prodCategory" placeholder="ምድብ"></div>
                    <div class="form-group"><label>የሽያጭ ዋጋ</label><input type="number" id="prodPrice" placeholder="የሽያጭ ዋጋ"></div>
                    <div class="form-group"><label>የግዢ ዋጋ</label><input type="number" id="prodCost" placeholder="የግዢ ዋጋ"></div>
                    <div class="form-group"><label>ዝቅተኛ ክምችት</label><input type="number" id="prodMinStock" placeholder="ዝቅተኛ ክምችት"></div>
                    <button class="btn-primary" onclick="addProduct()">አስገባ</button>
                </div>
                <div class="data-table">
                    <h3>የምርቶች ዝርዝር</h3>
                    <table>
                        <thead><tr><th>ስም</th><th>ኮድ</th><th>የሽያጭ ዋጋ</th><th>ክምችት</th><th>ዝቅተኛ</th><th>ድርጊት</th></tr></thead>
                        <tbody>
                            ${products.map(p => `
                                <tr>
                                    <td>${p.name}</td><td>${p.code || '-'}</td><td>${p.selling_price} ብር</td>
                                    <td style="${p.current_stock <= p.min_stock ? 'color:red' : ''}">${p.current_stock}</td>
                                    <td>${p.min_stock}</td>
                                    <td><button class="btn-edit" onclick="editProduct(${p.id})">አርትዕ</button><button class="btn-danger" onclick="deleteProduct(${p.id})">ሰርዝ</button></td>
                                </tr>
                            `).join('')}
                        </tbody>
                    </table>
                </div>
            `;
        }
        
        async function addProduct() {
            const name = document.getElementById('prodName').value;
            const price = document.getElementById('prodPrice').value;
            if (!name || !price) return alert('እባክዎ ስም እና ዋጋ ያስገቡ');
            
            await fetch('/api/products', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    name, code: document.getElementById('prodCode').value,
                    category: document.getElementById('prodCategory').value,
                    selling_price: price, cost_price: document.getElementById('prodCost').value,
                    min_stock: document.getElementById('prodMinStock').value || 0
                })
            });
            loadProducts();
        }
        
        async function deleteProduct(id) {
            if (confirm('እርግጠኛ ነዎት?')) {
                await fetch(`/api/products/${id}`, { method: 'DELETE' });
                loadProducts();
            }
        }
        
        // Load Sales
        async function loadSales() {
            const res = await fetch('/api/sales');
            const sales = await res.json();
            
            // Get products for sale form
            const prodRes = await fetch('/api/products');
            const products = await prodRes.json();
            
            document.getElementById('content').innerHTML = `
                <div class="form-container">
                    <h3>አዲስ ሽያጭ</h3>
                    <div class="form-group"><label>ደንበኛ</label>
                        <select id="saleCustomer"><option value="">የገንዘብ ግዢ</option>
                            ${(await fetch('/api/customers').then(r=>r.json())).map(c => `<option value="${c.id}">${c.name}</option>`).join('')}
                        </select>
                    </div>
                    <div id="saleItems">
                        <div class="sale-item">
                            <select class="product-select"><option value="">ምርት ምረጥ</option>
                                ${products.map(p => `<option value="${p.id}" data-price="${p.selling_price}" data-stock="${p.current_stock}">${p.name} - ${p.selling_price} ብር (ያለው: ${p.current_stock})</option>`).join('')}
                            </select>
                            <input type="number" class="quantity-input" placeholder="ብዛት" style="width:100px">
                            <button onclick="removeSaleItem(this)">❌</button>
                        </div>
                    </div>
                    <button class="btn-primary" onclick="addSaleItemRow()">+ ምርት ጨምር</button>
                    <div class="form-group"><label>ቅናሽ</label><input type="number" id="saleDiscount" placeholder="ቅናሽ" value="0"></div>
                    <div class="form-group"><label>የተከፈለ</label><input type="number" id="salePaid" placeholder="የተከፈለ ገንዘብ" value="0"></div>
                    <div class="form-group"><label>ክፍያ ዘዴ</label>
                        <select id="saleMethod"><option value="cash">ጥሬ ገንዘብ</option><option value="credit">ብድር</option><option value="bank">ባንክ</option></select>
                    </div>
                    <button class="btn-primary" onclick="createSale()">ሽያጩን አስመዝግብ</button>
                </div>
                <div class="data-table">
                    <h3>የሽያጭ ዝርዝር</h3>
                    <table>
                        <thead><tr><th>ተራ ቁጥር</th><th>ደንበኛ</th><th>ጠቅላላ</th><th>የተከፈለ</th><th>ቀሪ</th><th>ሁኔታ</th><th>ቀን</th></tr></thead>
                        <tbody>
                            ${sales.map(s => `
                                <tr>
                                    <td>${s.invoice_number}</td><td>${s.customer_name || 'የገንዘብ ግዢ'}</td>
                                    <td>${s.total.toLocaleString()} ብር</td><td>${s.amount_paid.toLocaleString()} ብር</td>
                                    <td>${s.remaining.toLocaleString()} ብር</td>
                                    <td>${s.payment_status === 'paid' ? 'ተከፍሏል' : (s.payment_status === 'partial' ? 'ከፊል' : 'አልተከፈለም')}</td>
                                    <td>${new Date(s.sale_date).toLocaleDateString()}</td>
                                </tr>
                            `).join('')}
                        </tbody>
                    </table>
                </div>
            `;
        }
        
        function addSaleItemRow() {
            const container = document.getElementById('saleItems');
            const newRow = document.createElement('div');
            newRow.className = 'sale-item';
            newRow.innerHTML = document.querySelector('.sale-item').cloneNode(true).innerHTML;
            container.appendChild(newRow);
        }
        
        function removeSaleItem(btn) {
            if (document.querySelectorAll('.sale-item').length > 1) {
                btn.parentElement.remove();
            }
        }
        
        async function createSale() {
            const items = [];
            const itemRows = document.querySelectorAll('.sale-item');
            
            for (let row of itemRows) {
                const productId = row.querySelector('.product-select').value;
                const quantity = row.querySelector('.quantity-input').value;
                if (productId && quantity && quantity > 0) {
                    items.push({ product_id: parseInt(productId), quantity: parseFloat(quantity) });
                }
            }
            
            if (items.length === 0) {
                alert('እባክዎ ቢያንስ አንድ ምርት ይምረጡ');
                return;
            }
            
            const res = await fetch('/api/sales', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    customer_id: document.getElementById('saleCustomer').value || null,
                    items: items,
                    discount: parseFloat(document.getElementById('saleDiscount').value) || 0,
                    amount_paid: parseFloat(document.getElementById('salePaid').value) || 0,
                    payment_method: document.getElementById('saleMethod').value
                })
            });
            
            if (res.ok) {
                alert('ሽያጩ ተመዝግቧል');
                loadSales();
            } else {
                const err = await res.json();
                alert(err.error);
            }
        }

        async function deleteEmployee(id) {

        // Load Preorders

                    <h3>አዲስ ቅድመ ትዕዛዝ</h3>

            document.getElementById('content').innerHTML = `

                            `).join('')}
                        </tbody>

        async function addStock() {
            const productId = document.getElementById('stockProduct').value;

            await fetch('/api/warehouse/add-stock', {

        // Edit functions
        function editCustomer(id) { alert('እዚህ ላይ የማርትዕ ቅጽ ይጨመራል'); }
        function editProduct(id) { alert('እዚህ ላይ የማርትዕ ቅጽ ይጨመራል'); }
        
        // Initialize
        checkAuth();
    </script>
