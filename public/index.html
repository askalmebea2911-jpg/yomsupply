<!DOCTYPE html>
<html lang="am">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>ዮም ሽያጭ ማኔጅመንት ሲስተም</title>
    <style>
        *{margin:0;padding:0;box-sizing:border-box}
        body{font-family:'Segoe UI',Tahoma,Geneva,Verdana,sans-serif;background:linear-gradient(135deg,#667eea 0%,#764ba2 100%);min-height:100vh}
        .login-container{display:flex;justify-content:center;align-items:center;min-height:100vh}
        .login-box{background:white;padding:40px;border-radius:10px;width:350px}
        .login-box h2{text-align:center;margin-bottom:30px;color:#333}
        .login-box input{width:100%;padding:12px;margin:10px 0;border:1px solid #ddd;border-radius:5px;font-size:16px}
        .login-box button{width:100%;padding:12px;background:#667eea;color:white;border:none;border-radius:5px;font-size:16px;cursor:pointer}
        .dashboard{display:none}
        .top-bar{background:white;padding:15px 30px;display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:10px}
        .top-bar h1{font-size:20px;color:#333}
        .user-info{display:flex;align-items:center;gap:10px;flex-wrap:wrap}
        .change-pwd-btn{background:#48bb78;color:white;border:none;padding:8px 15px;border-radius:5px;cursor:pointer}
        .logout-btn{background:#e53e3e;color:white;border:none;padding:8px 15px;border-radius:5px;cursor:pointer}
        .nav-menu{background:#2d3748;padding:10px 15px;display:flex;gap:8px;flex-wrap:wrap;overflow-x:auto}
        .nav-btn{background:none;color:white;border:none;padding:8px 12px;cursor:pointer;font-size:13px;border-radius:5px;white-space:nowrap}
        .nav-btn:hover{background:#4a5568}
        .nav-btn.active{background:#667eea}
        .content{padding:20px}
        .stats-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(180px,1fr));gap:15px;margin-bottom:25px}
        .stat-card{background:white;padding:15px;border-radius:10px;box-shadow:0 2px 5px rgba(0,0,0,0.1)}
        .stat-card h3{color:#666;font-size:13px;margin-bottom:8px}
        .stat-card .value{font-size:24px;font-weight:bold;color:#333}
        .data-table{background:white;border-radius:10px;overflow-x:auto;margin-top:20px;padding:15px}
        table{width:100%;border-collapse:collapse;min-width:500px}
        th,td{padding:10px;text-align:left;border-bottom:1px solid #eee;font-size:14px}
        th{background:#f7f7f7;font-weight:600}
        .form-container{background:white;padding:20px;border-radius:10px;margin-bottom:20px}
        .form-container h3{margin-bottom:15px;color:#333}
        .form-group{margin-bottom:15px}
        .form-group label{display:block;margin-bottom:5px;font-weight:500;font-size:14px}
        .form-group input,.form-group select,.form-group textarea{width:100%;padding:8px 10px;border:1px solid #ddd;border-radius:5px;font-size:14px}
        .btn-primary{background:#667eea;color:white;padding:10px 20px;border:none;border-radius:5px;cursor:pointer;font-size:14px}
        .btn-danger{background:#e53e3e;color:white;padding:5px 10px;border:none;border-radius:3px;cursor:pointer;font-size:12px}
        .btn-edit{background:#48bb78;color:white;padding:5px 10px;border:none;border-radius:3px;cursor:pointer;margin-right:5px;font-size:12px}
        .btn-warning{background:#ed8936;color:white;padding:5px 10px;border:none;border-radius:3px;cursor:pointer;font-size:12px}
        .modal{display:none;position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,0.5);justify-content:center;align-items:center;z-index:1000}
        .modal-content{background:white;padding:25px;border-radius:10px;width:450px;max-width:90%}
        .preview-box{background:#f0f0f0;padding:10px;border-radius:5px;margin-top:10px;text-align:center}
        .preview-box span{font-weight:bold;font-size:16px;color:#667eea}
        .error{color:red;text-align:center;margin-top:10px}
        @media (max-width:768px){.stats-grid{grid-template-columns:repeat(2,1fr)}.content{padding:15px}}
    </style>
</head>
<body>
    <div id="loginPage" class="login-container">
        <div class="login-box">
            <h2>ዮም ሽያጭ ማኔጅመንት</h2>
            <input type="text" id="username" placeholder="የተጠቃሚ ስም">
            <input type="password" id="password" placeholder="ይለፍ ቃል">
            <button onclick="login()">ግባ</button>
            <div id="loginError" class="error"></div>
        </div>
    </div>
    
    <div id="dashboard" class="dashboard">
        <div class="top-bar">
            <h1>ዮም ሽያጭ ማኔጅመንት ሲስተም</h1>
            <div class="user-info">
                <span id="userName"></span>
                <span id="userRole" style="font-size:12px;color:#666"></span>
                <button class="change-pwd-btn" onclick="showChangePassword()">🔑 ይለፍ ቃል ቀይር</button>
                <button class="logout-btn" onclick="logout()">🚪 ውጣ</button>
            </div>
        </div>
        
        <div class="nav-menu">
            <button class="nav-btn active" onclick="showPage('dashboard')">📊 ዳሽቦርድ</button>
            <button class="nav-btn" onclick="showPage('customers')">👥 ደንበኞች</button>
            <button class="nav-btn" onclick="showPage('products')">📦 ምርቶች</button>
            <button class="nav-btn" onclick="showPage('sales')">💰 ሽያጮች</button>
            <button class="nav-btn" onclick="showPage('employees')">👨‍💼 ሰራተኞች</button>
            <button class="nav-btn" onclick="showPage('users')">👤 ተጠቃሚዎች</button>
            <button class="nav-btn" onclick="showPage('vehicles')">🚗 ተሽከርካሪዎች</button>
            <button class="nav-btn" onclick="showPage('expenses')">💸 ወጪዎች</button>
            <button class="nav-btn" onclick="showPage('preorders')">📋 ቅድመ ትዕዛዝ</button>
            <button class="nav-btn" onclick="showPage('warehouse')">🏪 መጋዘን</button>
            <button class="nav-btn" onclick="showPage('reports')">📈 ሪፖርቶች</button>
        </div>
        
        <div class="content" id="content"></div>
    </div>
    
    <div id="passwordModal" class="modal">
        <div class="modal-content">
            <h3>🔑 ይለፍ ቃል ቀይር</h3>
            <div class="form-group"><label>አሁን ያለው ይለፍ ቃል</label><input type="password" id="currentPwd"></div>
            <div class="form-group"><label>አዲስ ይለፍ ቃል</label><input type="password" id="newPwd"></div>
            <div class="form-group"><label>አዲሱን ድገም</label><input type="password" id="confirmPwd"></div>
            <button class="btn-primary" onclick="changePassword()">ለውጥ</button>
            <button class="btn-danger" onclick="closePasswordModal()">ዝጋ</button>
            <div id="pwdMsg" style="margin-top:10px"></div>
        </div>
    </div>

    <script>
        let currentUser = null;
        
        async function fetchAPI(url, options = {}) {
            const res = await fetch(url, {
                ...options,
                credentials: 'include',
                headers: { 'Content-Type': 'application/json' }
            });
            return res;
        }
        
        async function checkAuth() {
            try {
                const res = await fetchAPI('/api/auth/me');
                if (res.ok) {
                    currentUser = await res.json();
                    document.getElementById('userName').innerText = currentUser.full_name;
                    document.getElementById('userRole').innerText = '(' + (currentUser.role === 'admin' ? 'አስተዳዳሪ' : 'ሰራተኛ') + ')';
                    document.getElementById('loginPage').style.display = 'none';
                    document.getElementById('dashboard').style.display = 'block';
                    showPage('dashboard');
                }
            } catch(e) { console.log(e); }
        }
        
        async function login() {
            const username = document.getElementById('username').value;
            const password = document.getElementById('password').value;
            if (!username || !password) {
                document.getElementById('loginError').innerText = 'ስም እና ይለፍ ቃል ያስገቡ';
                return;
            }
            const res = await fetchAPI('/api/auth/login', {
                method: 'POST',
                body: JSON.stringify({ username, password })
            });
            if (res.ok) {
                const data = await res.json();
                currentUser = data.user;
                document.getElementById('userName').innerText = currentUser.full_name;
                document.getElementById('loginPage').style.display = 'none';
                document.getElementById('dashboard').style.display = 'block';
                showPage('dashboard');
            } else {
                const err = await res.json();
                document.getElementById('loginError').innerText = err.error;
            }
        }
        
        async function logout() {
            await fetchAPI('/api/auth/logout', { method: 'POST' });
            location.reload();
        }
        
        function showChangePassword() {
            document.getElementById('passwordModal').style.display = 'flex';
            document.getElementById('currentPwd').value = '';
            document.getElementById('newPwd').value = '';
            document.getElementById('confirmPwd').value = '';
            document.getElementById('pwdMsg').innerHTML = '';
        }
        
        function closePasswordModal() {
            document.getElementById('passwordModal').style.display = 'none';
        }
        
        async function changePassword() {
            const current = document.getElementById('currentPwd').value;
            const newPwd = document.getElementById('newPwd').value;
            const confirm = document.getElementById('confirmPwd').value;
            if (!current || !newPwd) {
                document.getElementById('pwdMsg').innerHTML = '<span style="color:red">ሁሉንም ይሙሉ</span>';
                return;
            }
            if (newPwd !== confirm) {
                document.getElementById('pwdMsg').innerHTML = '<span style="color:red">ይለፍ ቃሎች አይመሳሰሉም</span>';
                return;
            }
            if (newPwd.length < 4) {
                document.getElementById('pwdMsg').innerHTML = '<span style="color:red">ቢያንስ 4 ፊደላት ያስፈልጋሉ</span>';
                return;
            }
            const res = await fetchAPI('/api/profile/change-password', {
                method: 'POST',
                body: JSON.stringify({ current_password: current, new_password: newPwd })
            });
            const data = await res.json();
            if (res.ok) {
                document.getElementById('pwdMsg').innerHTML = '<span style="color:green">✓ ተቀይሯል!</span>';
                setTimeout(() => closePasswordModal(), 1500);
            } else {
                document.getElementById('pwdMsg').innerHTML = '<span style="color:red">' + data.error + '</span>';
            }
        }
        
        async function showPage(page) {
            document.querySelectorAll('.nav-btn').forEach(btn => btn.classList.remove('active'));
            if(event && event.target) event.target.classList.add('active');
            if(page === 'dashboard') await loadDashboard();
            else if(page === 'customers') await loadCustomers();
            else if(page === 'products') await loadProducts();
            else if(page === 'sales') await loadSales();
            else if(page === 'employees') await loadEmployees();
            else if(page === 'users') await loadUsers();
            else if(page === 'vehicles') await loadVehicles();
            else if(page === 'expenses') await loadExpenses();
            else if(page === 'preorders') await loadPreorders();
            else if(page === 'warehouse') await loadWarehouse();
            else if(page === 'reports') await loadReports();
        }
        
        async function loadDashboard() {
            const res = await fetchAPI('/api/dashboard');
            const data = await res.json();
            document.getElementById('content').innerHTML = `
                <div class="stats-grid">
                    <div class="stat-card"><h3>📅 የዛሬ ሽያጭ</h3><div class="value">${(data.todaySales || 0).toLocaleString()} ብር</div></div>
                    <div class="stat-card"><h3>📆 የወሩ ሽያጭ</h3><div class="value">${(data.monthSales || 0).toLocaleString()} ብር</div></div>
                    <div class="stat-card"><h3>👥 ደንበኞች</h3><div class="value">${data.totalCustomers || 0}</div></div>
                    <div class="stat-card"><h3>📦 ምርቶች</h3><div class="value">${data.totalProducts || 0}</div></div>
                    <div class="stat-card"><h3>⚠️ ዝቅተኛ ክምችት</h3><div class="value">${data.lowStockCount || 0}</div></div>
                    <div class="stat-card"><h3>💸 የዛሬ ወጪ</h3><div class="value">${(data.todayExpenses || 0).toLocaleString()} ብር</div></div>
                </div>
                <div class="data-table"><h3>📋 የቅርብ ጊዜ ሽያጮች</h3>
                <tr><thead><tr><th>ተራ ቁጥር</th><th>ደንበኛ</th><th>ጠቅላላ</th><th>ቀን</th></tr></thead>
                <tbody>${(data.recentSales || []).map(s => `<tr><td>${s.invoice_number}</td><td>${s.customer_name || 'የገንዘብ ግዢ'}</td><td>${(s.total || 0).toLocaleString()} ብር</td><td>${new Date(s.sale_date).toLocaleDateString()}</td></tr>`).join('')}</tbody></table></div>
            `;
        }
        
        async function loadCustomers() {
            const res = await fetchAPI('/api/customers');
            const customers = await res.json();
            document.getElementById('content').innerHTML = `
                <div class="form-container"><h3>➕ አዲስ ደንበኛ</h3>
                    <div class="form-group"><label>ሙሉ ስም</label><input type="text" id="custName"></div>
                    <div class="form-group"><label>ስልክ</label><input type="text" id="custPhone"></div>
                    <div class="form-group"><label>አድራሻ</label><input type="text" id="custAddress"></div>
                    <div class="form-group"><label>ኢሜል</label><input type="email" id="custEmail"></div>
                    <div class="form-group"><label>የብድር ገደብ (ብር)</label><input type="number" id="custCredit"></div>
                    <button class="btn-primary" onclick="addCustomer()">አስገባ</button>
                </div>
                <div class="data-table"><h3>📋 የደንበኞች ዝርዝር</h3>
                <table><thead><tr><th>ስም</th><th>ስልክ</th><th>አድራሻ</th><th>የብድር ገደብ</th><th>ድርጊት</th></tr></thead>
                <tbody>${customers.map(c => `<tr><td>${c.name}</td><td>${c.phone || '-'}</td><td>${c.address || '-'}</td><td>${c.credit_limit} ብር</td><td><button class="btn-danger" onclick="deleteCustomer(${c.id})">ሰርዝ</button> <button class="btn-edit" onclick="editCustomer(${c.id})">አርትዕ</button></td>`).join('')}</tbody>
                </table></div>
            `;
        }
        
        async function addCustomer() {
            const name = document.getElementById('custName').value;
            if(!name) return alert('ስም ያስገቡ');
            await fetchAPI('/api/customers', {
                method: 'POST',
                body: JSON.stringify({ 
                    name: name, 
                    phone: document.getElementById('custPhone').value, 
                    address: document.getElementById('custAddress').value, 
                    email: document.getElementById('custEmail').value, 
                    credit_limit: parseFloat(document.getElementById('custCredit').value) || 0 
                })
            });
            loadCustomers();
        }
        
        async function deleteCustomer(id) {
            if(confirm('እርግጠኛ ነዎት?')) { 
                await fetchAPI(`/api/customers/${id}`, { method: 'DELETE' }); 
                loadCustomers(); 
            }
        }
        
        async function editCustomer(id) {
            const newName = prompt('አዲስ ስም ያስገቡ');
            if(newName) {
                await fetchAPI(`/api/customers/${id}`, { 
                    method: 'PUT', 
                    body: JSON.stringify({ name: newName }) 
                });
                loadCustomers();
            }
        }
        
        async function loadProducts() {
            const res = await fetchAPI('/api/products');
            const products = await res.json();
            document.getElementById('content').innerHTML = `
                <div class="form-container"><h3>➕ አዲስ ምርት</h3>
                    <div class="form-group"><label>ስም</label><input type="text" id="prodName"></div>
                    <div class="form-group"><label>ኮድ</label><input type="text" id="prodCode"></div>
                    <div class="form-group"><label>ምድብ</label><input type="text" id="prodCategory"></div>
                    <div class="form-group"><label>የሽያጭ ዋጋ (ብር)</label><input type="number" id="prodPrice"></div>
                    <div class="form-group"><label>የግዢ ዋጋ (ብር)</label><input type="number" id="prodCost"></div>
                    <div class="form-group"><label>ዝቅተኛ ክምችት</label><input type="number" id="prodMinStock"></div>
                    <button class="btn-primary" onclick="addProduct()">አስገባ</button>
                </div>
                <div class="data-table"><h3>📦 የምርቶች ዝርዝር</h3>
                <table><thead><tr><th>ስም</th><th>ኮድ</th><th>ምድብ</th><th>ዋጋ</th><th>ክምችት</th><th>ዝቅተኛ</th><th>ድርጊት</th></tr></thead>
                <tbody>${products.map(p => `<tr>
                    <td>${p.name}</td>
                    <td>${p.code || '-'}</td>
                    <td>${p.category || '-'}</td>
                    <td>${p.selling_price} ብር</td>
                    <td style="${p.current_stock <= p.min_stock ? 'color:red' : ''}">${p.current_stock}</td>
                    <td>${p.min_stock}</td>
                    <td><button class="btn-danger" onclick="deleteProduct(${p.id})">ሰርዝ</button> 
                        <button class="btn-edit" onclick="editProduct(${p.id})">አርትዕ</button>
                       </td>
                </tr>`).join('')}</tbody>
                </table></div>
            `;
        }
        
        async function addProduct() {
            const name = document.getElementById('prodName').value;
            const price = document.getElementById('prodPrice').value;
            if(!name || !price) return alert('ስም እና ዋጋ ያስገቡ');
            await fetchAPI('/api/products', {
                method: 'POST',
                body: JSON.stringify({ 
                    name: name, 
                    code: document.getElementById('prodCode').value, 
                    category: document.getElementById('prodCategory').value, 
                    selling_price: parseFloat(price), 
                    cost_price: parseFloat(document.getElementById('prodCost').value) || 0, 
                    min_stock: parseFloat(document.getElementById('prodMinStock').value) || 0 
                })
            });
            loadProducts();
        }
        
        async function deleteProduct(id) {
            if(confirm('እርግጠኛ ነዎት?')) { 
                await fetchAPI(`/api/products/${id}`, { method: 'DELETE' }); 
                loadProducts(); 
            }
        }
        
        async function editProduct(id) {
            const newPrice = prompt('አዲስ ዋጋ ያስገቡ');
            if(newPrice) {
                await fetchAPI(`/api/products/${id}`, { 
                    method: 'PUT', 
                    body: JSON.stringify({ selling_price: parseFloat(newPrice) }) 
                });
                loadProducts();
            }
        }
        
        async function loadSales() {
            const sales = await fetchAPI('/api/sales').then(r=>r.json());
            const products = await fetchAPI('/api/products').then(r=>r.json());
            const customers = await fetchAPI('/api/customers').then(r=>r.json());
            document.getElementById('content').innerHTML = `
                <div class="form-container"><h3>➕ አዲስ ሽያጭ</h3>
                    <div class="form-group"><label>ደንበኛ</label>
                        <select id="saleCustomer"><option value="">የገንዘብ ግዢ</option>${customers.map(c => `<option value="${c.id}">${c.name}</option>`).join('')}</select>
                    </div>
                    <div id="saleItems">
                        <div class="sale-item" style="display:flex; gap:10px; margin-bottom:10px">
                            <select class="product-select" style="flex:2">
                                <option value="">ምርት ምረጥ</option>
                                ${products.map(p => `<option value="${p.id}" data-price="${p.selling_price}" data-stock="${p.current_stock}">${p.name} - ${p.selling_price} ብር (ያለው: ${p.current_stock})</option>`).join('')}
                            </select>
                            <input type="number" class="quantity-input" placeholder="ብዛት" style="flex:1">
                            <button onclick="removeSaleItem(this)" style="background:#e53e3e;color:white;border:none;padding:5px 10px;border-radius:3px">❌</button>
                        </div>
                    </div>
                    <button class="btn-edit" onclick="addSaleItemRow()" style="margin-bottom:15px">+ ሌላ ምርት ጨምር</button>
                    <div class="form-group"><label>ቅናሽ (ብር)</label><input type="number" id="saleDiscount" value="0"></div>
                    <div class="form-group"><label>የተከፈለ</label><input type="number" id="salePaid" value="0"></div>
                    <div class="form-group"><label>ክፍያ ዘዴ</label>
                        <select id="saleMethod"><option value="cash">ጥሬ ገንዘብ</option><option value="credit">ብድር</option><option value="bank">ባንክ</option></select>
                    </div>
                    <button class="btn-primary" onclick="createSale()">ሽያጩን አስመዝግብ</button>
                </div>

        async function createSale() {
            const items = [];
            for (let row of document.querySelectorAll('.sale-item')) {
                const productId = row.querySelector('.product-select').value;
                const quantity = row.querySelector('.quantity-input').value;
                if (productId && quantity && quantity > 0) {
                    items.push({ product_id: parseInt(productId), quantity: parseFloat(quantity) });
                }
            }
            if (items.length === 0) return alert('ቢያንስ አንድ ምርት ይምረጡ');
            
            const res = await fetchAPI('/api/sales', {

                body: JSON.stringify({ 
                    customer_id: document.getElementById('saleCustomer').value || null, 
                    items: items, 
                    discount: parseFloat(document.getElementById('saleDiscount').value) || 0, 
                    amount_paid: parseFloat(document.getElementById('salePaid').value) || 0, 
                    payment_method: document.getElementById('saleMethod').value 
                })
            });
            if (res.ok) { 
                alert('ሽያጩ ተመዝግቧል'); 
                loadSales(); 
            } else { 
                const err = await res.json(); 
                alert(err.error); 
            }

                    <td>${r.date}</td>
                    <td>${r.count}</td>
                    <td>${(r.total || 0).toLocaleString()} ብር</td><td>${(r.paid || 0).toLocaleString()} ብር</td>
                </tr>`).join('')}</tbody>
                </table></div>
            `;
        }
        
        checkAuth();
    </script>
</body>
</html>
